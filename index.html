<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝石の煌めき 盤面入力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  :root {
    --bg:#0e0c0a;--surface:#1a1712;--surface2:#221f1a;
    --border:#3a3228;--gold:#c9a84c;--gold2:#f0d080;
    --text:#e8dcc8;--text2:#9a8c78;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;padding:12px;max-width:480px;margin:0 auto;}
  h1{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);text-align:center;letter-spacing:0.08em;margin-bottom:4px;}
  .subtitle{text-align:center;font-size:0.72rem;color:var(--text2);margin-bottom:20px;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
  .section-title{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold);letter-spacing:0.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .gems-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .gem-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .gem-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:bold;border:2px solid rgba(255,255,255,0.15);box-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .gem-icon.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);color:#555;}
  .gem-icon.blue{background:radial-gradient(circle at 35% 35%,#6ab0ff,#2a5faa);color:#fff;}
  .gem-icon.green{background:radial-gradient(circle at 35% 35%,#6acf8a,#2a7a44);color:#fff;}
  .gem-icon.red{background:radial-gradient(circle at 35% 35%,#ff7777,#aa2222);color:#fff;}
  .gem-icon.black{background:radial-gradient(circle at 35% 35%,#666,#111);color:#ccc;}
  .gem-icon.gold{background:radial-gradient(circle at 35% 35%,#ffe080,#c08020);color:#5a3a00;}
  .gem-label{font-size:0.6rem;color:var(--text2);text-align:center;}
  .gem-input{width:44px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;font-size:0.9rem;font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none;appearance:none;padding:0 2px;}
  .field-label{font-size:0.65rem;color:var(--text2);margin-bottom:4px;}
  .cards-tier{margin-bottom:14px;}
  .tier-label{font-size:0.65rem;color:var(--text2);margin-bottom:6px;letter-spacing:0.05em;}
  .cards-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .card-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;display:flex;flex-direction:column;gap:6px;}
  .card-sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:0.75rem;padding:6px 5px;font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none;appearance:none;}
  .card-sel option{background:#1a1712;}
  .card-info{font-size:0.62rem;color:var(--gold);padding:4px 2px;min-height:24px;line-height:1.5;}
  .btn-buy{width:100%;padding:7px;background:linear-gradient(135deg,#4a8c5c,#2a6a3c);border:none;border-radius:6px;color:#fff;font-size:0.75rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
  .btn-reserve{width:100%;padding:7px;background:linear-gradient(135deg,#4a6a9c,#2a4a7c);border:none;border-radius:6px;color:#fff;font-size:0.75rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
  .btn-end-turn{padding:8px 16px;background:linear-gradient(135deg,#7a5a2a,#c9a84c);border:none;border-radius:8px;color:#0e0c0a;font-size:0.8rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;font-weight:500;}
  .nobles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .noble-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:4px;}
  .card-gem-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
  .card-gem-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);text-align:center;font-size:0.8rem;padding:5px 0;font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none;appearance:none;}
  .gem-hint{font-size:0.55rem;color:var(--text2);display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:1px;}
  .gem-hint span{text-align:center;}
  .player-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .tab-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:0.72rem;padding:5px 12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
  .tab-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500;}
  .player-panel{display:none;}
  .player-panel.active{display:block;}
  .player-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .player-name-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;padding:5px 8px;font-family:'Noto Sans JP',sans-serif;width:120px;}
  .cards-owned{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}
  .color-owned{display:flex;flex-direction:column;align-items:center;gap:4px;}

<script>
const gemColors = ['white','blue','green','red','black'];
const gemJP = ['白','青','緑','赤','黒'];

const TURN_LIMIT = 40;
const BONUS_TO_COLOR = {'白':'white','青':'blue','緑':'green','赤':'red','黒':'black'};
let numPlayers = 2;

const ALL_CARDS = [

  [2,'赤',2,0,0,0,0,5],[2,'赤',3,0,0,0,6,0],
  [2,'黒',1,3,2,2,0,0],[2,'黒',1,3,0,3,0,2],[2,'黒',2,0,1,4,2,0],[2,'黒',2,0,0,5,3,0],
  [2,'黒',2,5,0,0,0,0],[2,'黒',3,0,0,0,0,6],
  [2,'白',1,2,3,0,3,0],[2,'白',1,0,0,3,2,2],[2,'白',2,0,0,1,4,2],[2,'白',2,0,0,0,5,0],

  [2,'緑',2,0,5,3,0,0],[2,'緑',3,0,0,6,0,0],
  [3,'青',3,3,0,3,3,5],[3,'青',4,7,0,0,0,0],[3,'青',4,6,3,0,0,3],[3,'青',5,7,3,0,0,0],
  [3,'赤',3,3,5,3,0,3],[3,'赤',4,0,3,6,3,0],[3,'赤',4,0,0,7,0,0],[3,'赤',5,0,0,7,3,0],
  [3,'黒',3,3,3,5,3,0],[3,'黒',4,0,0,0,7,0],[3,'黒',4,0,0,3,6,3],[3,'黒',5,0,0,0,7,3],
  [3,'白',3,0,3,3,5,3],[3,'白',4,0,0,0,0,7],[3,'白',4,3,0,0,3,6],[3,'白',5,3,0,0,0,7],
  [3,'緑',3,5,3,0,3,3],[3,'緑',4,3,6,3,0,0],[3,'緑',4,0,7,0,0,0],[3,'緑',5,0,7,3,0,0],

// ===== モーダル =====
function showAlert(msg, cb) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalMsg').textContent = msg;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';
  const ok = document.createElement('button');
  ok.className = 'modal-ok';
  ok.textContent = 'OK';
  ok.addEventListener('click', function() {
    if (ok.disabled) return;
    ok.disabled = true;
    overlay.classList.remove('show');
    if (cb) cb();
  });
  btns.appendChild(ok);
  overlay.classList.add('show');
}

let _confirmActive = false;
function showConfirm(msg, cb) {
  if (_confirmActive) return;
  _confirmActive = true;
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalMsg').textContent = msg;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';
  const cancel = document.createElement('button');
  cancel.className = 'modal-cancel';
  cancel.textContent = 'キャンセル';
  cancel.addEventListener('click', function() { overlay.classList.remove('show'); _confirmActive=false; });
  const ok = document.createElement('button');
  ok.className = 'modal-ok';
  ok.textContent = 'OK';
  ok.addEventListener('click', function() {
    if (ok.disabled) return;
    ok.disabled = true;
    overlay.classList.remove('show');
    _confirmActive = false;
    cb();
  });
  btns.appendChild(cancel);
  btns.appendChild(ok);
  overlay.classList.add('show');
}

// ===== ユーティリティ =====
function fillSel(id, max) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = Array.from({length:max+1},(_,i)=>`<option value="${i}">${i}</option>`).join('');
}

function sel(id, max, cls, style) {
  const opts = Array.from({length:max+1},(_,i)=>`<option value="${i}">${i}</option>`).join('');
  return `<select id="${id}" class="${cls}"${style?' style="'+style+'"':''}>${opts}</select>`;
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function gemCost(prefix) {
  return gemColors.map((c,i)=>{
    const v = val(prefix+'_'+c);
    return v&&v!=='0' ? gemJP[i]+v : '';
  }).filter(Boolean).join('・');
}

function cardLabel(c) {
  const parts = gemJP.map((j,i)=>c[3+i]?j+c[3+i]:'').filter(Boolean).join(' ');
  return `${bonusEmoji[c[1]]}${c[1]} | ${parts||'コストなし'}`;
}

// ===== 場のカード =====
function cardHTML(tier, idx) {
  const tierCards = ALL_CARDS.filter(c=>c[0]===tier);
  const ptsList = [...new Set(tierCards.map(c=>c[2]))].sort((a,b)=>a-b);
  const ptsOpts = '<option value="">勝利点</option>' + ptsList.map(p=>`<option value="${p}">${p}点</option>`).join('');
  const bonusOpts = '<option value="">ボーナス色</option>' + ['白','青','緑','赤','黒'].map(b=>`<option value="${b}">${bonusEmoji[b]}${b}</option>`).join('');
  return `<div class="card-box">
    <div class="field-label">カード${idx+1}</div>
    <select class="card-sel" id="c${tier}_${idx}_pts" data-tier="${tier}" data-idx="${idx}" data-role="cpts">${ptsOpts}</select>
    <select class="card-sel" id="c${tier}_${idx}_bonus" data-tier="${tier}" data-idx="${idx}" data-role="cbonus">${bonusOpts}</select>
    <select class="card-sel" id="c${tier}_${idx}_pick" data-tier="${tier}" data-idx="${idx}" data-role="cpick"><option value="">↑で絞り込む</option></select>
    <div class="card-info" id="c${tier}_${idx}_info"></div>
    <button class="btn-buy" data-tier="${tier}" data-idx="${idx}" data-role="buy">購入</button>
    <button class="btn-reserve" data-tier="${tier}" data-idx="${idx}" data-role="reserve">予約</button>
  </div>`;
}

function updateCardSelect(tier, idx, exceptPickId) {
  const pickId = `c${tier}_${idx}_pick`;
  const pts = val(`c${tier}_${idx}_pts`);
  const bonus = val(`c${tier}_${idx}_bonus`);
  const pick = document.getElementById(pickId);
  const info = document.getElementById(`c${tier}_${idx}_info`);
  if (info) info.textContent = '';
  const prevVal = pick.value;
  pick.innerHTML = '<option value="">カードを選択</option>';
  const used = getUsedCardIndices(exceptPickId || pickId);
  const filtered = ALL_CARDS.filter((c,ci)=>
    c[0]===tier &&
    (pts===''||String(c[2])===pts) &&
    (bonus===''||c[1]===bonus) &&
    !used.has(ci)
  );
  filtered.forEach(c=>{
    const ci = ALL_CARDS.indexOf(c);
    const opt = document.createElement('option');
    opt.value = ci;
    opt.textContent = cardLabel(c);
    pick.appendChild(opt);
  });
  if (prevVal && pick.querySelector(`option[value="${prevVal}"]`)) {
    pick.value = prevVal;
    showCardInfo(tier, idx);
  } else if (prevVal) {
    // 選択済みカードが新しいフィルター条件を満たさなくなった
    if (info) info.textContent = '';
    refreshAllCardSelects(pickId);
  }
  if (filtered.length===1) { pick.selectedIndex=1; showCardInfo(tier,idx); }
}

function showCardInfo(tier, idx) {
  const pick = document.getElementById(`c${tier}_${idx}_pick`);
  const info = document.getElementById(`c${tier}_${idx}_info`);
  if (!pick||!pick.value) { if(info) info.textContent=''; return; }
  const c = ALL_CARDS[parseInt(pick.value)];
  if (!c) { if(info) info.textContent=''; return; }
  const cost = gemJP.map((j,i)=>c[3+i]?`${j}:${c[3+i]}`:'').filter(Boolean).join(' ');
  if (info) info.textContent = `${bonusEmoji[c[1]]}${c[1]} ${c[2]}点 | ${cost||'コストなし'}`;
}

function getCardData(tier, idx) {
  const pick = document.getElementById(`c${tier}_${idx}_pick`);
  if (!pick||!pick.value) return null;
  return ALL_CARDS[parseInt(pick.value)];
}

function resetCardSlot(tier, idx) {
  ['pts','bonus'].forEach(k=>{ const el=document.getElementById(`c${tier}_${idx}_${k}`); if(el) el.value=''; });
  const p = document.getElementById(`c${tier}_${idx}_pick`);
  if (p) p.innerHTML='<option value="">↑で絞り込む</option>';
  const i = document.getElementById(`c${tier}_${idx}_info`);
  if (i) i.textContent='';
  refreshAllCardSelects(`c${tier}_${idx}_pick`);
}

function getUsedCardIndices(excludePickId) {
  const used = new Set();
  for (let t=1; t<=3; t++) for (let i=0; i<4; i++) {
    const id=`c${t}_${i}_pick`;
    if(id===excludePickId) continue;
    const el=document.getElementById(id);
    if(el&&el.value) used.add(parseInt(el.value));
  }
  for (let p=0; p<numPlayers; p++) for (let r=0; r<3; r++) {
    const id=`pr_${p}_${r}_pick`;
    if(id===excludePickId) continue;
    const el=document.getElementById(id);
    if(el&&el.value) used.add(parseInt(el.value));
  }
  return used;
}

function refreshAllCardSelects(exceptPickId) {
  for(let t=1;t<=3;t++) for(let i=0;i<4;i++){
    const pickId=`c${t}_${i}_pick`;
    if(pickId===exceptPickId) continue;
    if(val(`c${t}_${i}_pts`)||val(`c${t}_${i}_bonus`)) updateCardSelect(t,i,exceptPickId);
  }
  for(let p=0;p<numPlayers;p++) for(let r=0;r<3;r++){
    const pickId=`pr_${p}_${r}_pick`;
    if(pickId===exceptPickId) continue;
    if(val(`pr_${p}_${r}_pts`)||val(`pr_${p}_${r}_bonus`)) updateReservedSelect(p,r,exceptPickId);
  }
}

// ===== 購入共通処理 =====
function processPurchase(c, p, title, onReset) {
  const colorKeys = ['white','blue','green','red','black'];
  const bonusKey = BONUS_TO_COLOR[c[1]];
  const playerTokens = {};
  colorKeys.forEach(k=>{ playerTokens[k]=parseInt(val('pt_'+p+'_'+k)||0); });
  let gold = parseInt(val('pt_'+p+'_gold')||0);
  const bonusDiscount = colorKeys.map(k=>parseInt(val('pb_'+p+'_'+k)||0));
  const actualCosts = c.slice(3).map((cost,i)=>Math.max(0,cost-bonusDiscount[i]));

  let goldNeeded = 0;
  const pay = actualCosts.map((cost,i)=>{
    const have = playerTokens[colorKeys[i]];
    if (have>=cost) return cost;
    goldNeeded += cost-have;
    return have;
  });

  if (goldNeeded>gold) { showAlert(`トークンが足りません\n（金${goldNeeded}枚必要、手持ち${gold}枚）`); return; }

  const payDesc = colorKeys.map((k,i)=>pay[i]?`${gemJP[i]}${pay[i]}`:'').filter(Boolean).join('・');
  const goldDesc = goldNeeded?`・金${goldNeeded}`:'';
  const msg = `${title}\n${bonusEmoji[c[1]]}${c[1]} ${c[2]}点\n支払い: ${payDesc||'なし'}${goldDesc}`;

  saveUndo();
  showConfirm(msg, function() {
    colorKeys.forEach((k,i)=>{
      const el=document.getElementById('pt_'+p+'_'+k);
      if(el) el.value=String(playerTokens[k]-pay[i]);
    });
    const goldEl=document.getElementById('pt_'+p+'_gold');
    if(goldEl) goldEl.value=String(gold-goldNeeded);

    colorKeys.forEach((k,i)=>{
      if(pay[i]>0){
        const el=document.getElementById('tk_'+k);
        if(el) el.value=String(Math.min(TOKEN_LIMIT_BY_PLAYERS[numPlayers],parseInt(el.value||0)+pay[i]));
      }
    });
    if(goldNeeded>0){
      const el=document.getElementById('tk_gold');
      if(el) el.value=String(Math.min(GOLD_LIMIT,parseInt(el.value||0)+goldNeeded));
    }

    const bonusEl=document.getElementById('pb_'+p+'_'+bonusKey);
    if(bonusEl) bonusEl.value=String(parseInt(bonusEl.value||0)+1);

    if(c[2]>0){
      const vpEl=document.getElementById('pvp_'+p);
      if(vpEl) vpEl.value=String(parseInt(vpEl.value||0)+c[2]);
    }

    onReset();
    advanceTurn();
    saveState();
  });
}

// ===== 購入 =====
function buyCard(tier, idx) {
  const c = getCardData(tier, idx);
  if (!c) { showAlert('先にカードを選択してください'); return; }
  const p = parseInt(document.getElementById('currentPlayer')?.value||0);
  processPurchase(c, p, '購入しますか？', ()=>resetCardSlot(tier,idx));

// ===== 予約 =====
function reserveCard(tier, idx) {
  const c = getCardData(tier, idx);
  if (!c) { showAlert('先にカードを選択してください'); return; }
  const p = parseInt(document.getElementById('currentPlayer')?.value||0);

  let slot = -1;
  for (let r=0;r<3;r++) {
    const pick=document.getElementById(`pr_${p}_${r}_pick`);
    if(pick&&!pick.value){ slot=r; break; }
  }
  if (slot===-1) { showAlert('予約スロットが満杯です（最大3枚）'); return; }

  const fieldGold = parseInt(document.getElementById('tk_gold')?.value||0);
  const goldNote = fieldGold > 0 ? '※場の金トークンを1枚取得します' : '※場に金トークンがないため取得できません';
  const msg = `予約しますか？\n${bonusEmoji[c[1]]}${c[1]} ${c[2]}点\n${goldNote}`;
  saveUndo();
  showConfirm(msg, function() {
    const goldEl=document.getElementById('tk_gold');
    const pgoldEl=document.getElementById(`pt_${p}_gold`);
    if(goldEl&&pgoldEl&&parseInt(goldEl.value||0)>0){
      goldEl.value=String(parseInt(goldEl.value)-1);
      pgoldEl.value=String(Math.min(5,parseInt(pgoldEl.value||0)+1));
    }

    const cardIdx=ALL_CARDS.indexOf(c);
    resetCardSlot(tier,idx);
    const ptsEl=document.getElementById(`pr_${p}_${slot}_pts`);
    const bonusEl=document.getElementById(`pr_${p}_${slot}_bonus`);
    if(ptsEl) ptsEl.value=String(c[2]);
    if(bonusEl) bonusEl.value=c[1];
    updateReservedSelect(p,slot);
    const pickEl=document.getElementById(`pr_${p}_${slot}_pick`);
    if(pickEl){ pickEl.value=String(cardIdx); showReservedInfo(p,slot); }
    advanceTurn();
    saveState();
  });
}

// ===== ターン進行 =====
function advanceTurn() {
  const tc=document.getElementById('turnCount');
  if(tc) tc.value=String(Math.min(TURN_LIMIT,parseInt(tc.value||1)+1));
  // 手番プレイヤーを次へ＆タブ切替
  const cp=document.getElementById('currentPlayer');
  if(cp) {
    const next=(parseInt(cp.value||0)+1)%numPlayers;
    cp.value=String(next);
    switchTab(next);
  }
  saveState();
}

// ===== 予約カード絞り込み =====
function updateReservedSelect(p, r, exceptPickId) {
  const pickId=`pr_${p}_${r}_pick`;
  const pts=val(`pr_${p}_${r}_pts`);
  const bonus=val(`pr_${p}_${r}_bonus`);
  const pick=document.getElementById(pickId);
  const info=document.getElementById(`pr_${p}_${r}_info`);
  if(info) info.textContent='';
  const prevVal=pick.value;
  pick.innerHTML='<option value="">カードを選択</option>';
  const used=getUsedCardIndices(exceptPickId || pickId);
  const filtered=ALL_CARDS.filter((c,ci)=>(pts===''||String(c[2])===pts)&&(bonus===''||c[1]===bonus)&&!used.has(ci));
  filtered.forEach(c=>{
    const ci=ALL_CARDS.indexOf(c);
    const opt=document.createElement('option');
    opt.value=ci;
    opt.textContent=`T${c[0]} ${cardLabel(c)}`;
    pick.appendChild(opt);
  });
  if(prevVal && pick.querySelector(`option[value="${prevVal}"]`)) {
    pick.value=prevVal;
    showReservedInfo(p,r);
  } else if(prevVal) {
    // 選択済みカードが新しいフィルター条件を満たさなくなった
    if(info) info.textContent='';
    refreshAllCardSelects(pickId);
  }
  if(filtered.length===1){ pick.selectedIndex=1; showReservedInfo(p,r); }
}

function showReservedInfo(p, r) {
  const pick=document.getElementById(`pr_${p}_${r}_pick`);
  const info=document.getElementById(`pr_${p}_${r}_info`);
  if(!pick||!pick.value){ if(info) info.textContent=''; return; }
  const c=ALL_CARDS[parseInt(pick.value)];
  if(!c){ if(info) info.textContent=''; return; }
  const cost=gemJP.map((j,i)=>c[3+i]?`${j}:${c[3+i]}`:'').filter(Boolean).join(' ');
  if(info) info.textContent=`T${c[0]} ${bonusEmoji[c[1]]}${c[1]} ${c[2]}点 | ${cost||'コストなし'}`;
}

function getReservedData(p, r) {
  const pick=document.getElementById(`pr_${p}_${r}_pick`);
  if(!pick||!pick.value) return null;
  return ALL_CARDS[parseInt(pick.value)];
}

// ===== テキスト生成 =====
function generate() {
  const tnames=['白','青','緑','赤','黒','金'];
  const tids=['white','blue','green','red','black','gold'];
  let out='【宝石の煌めき 盤面情報】\n';
  out+=`プレイヤー数: ${numPlayers}人\n`;
  const turn=val('turnCount')||'1';
  const cpIdx=parseInt(val('currentPlayer')||0);
  const cpName=val('pname_'+cpIdx)||(cpIdx===0?'自分':'相手'+cpIdx);
  out+=`ターン数: ${turn}ターン目\n`;
  out+=`手番: ${cpName}\n\n`;
  out+='■ 場の宝石トークン（残り）\n';
  tids.forEach((c,i)=>{ const v=val('tk_'+c); if(v&&v!=='0') out+=`  ${tnames[i]}: ${v}枚\n`; });
  out+='\n';
  [3,2,1].forEach(tier=>{
    out+=`■ Tier${tier}カード\n`;
    for(let i=0;i<4;i++){
      const c=getCardData(tier,i);
      if(!c){out+=`  [カード${i+1}] 未選択\n`;continue;}
      const cost=gemJP.map((j,k)=>c[3+k]?j+c[3+k]:'').filter(Boolean).join('・');
      out+=`  [カード${i+1}] 勝利点${c[2]}点 ボーナス:${c[1]} コスト:${cost||'なし'}\n`;
    }
    out+='\n';
  });
  out+='■ 貴族タイル（3点）\n';
  for(let i=0;i<numPlayers+1;i++){ const req=gemCost('n'+i); if(req) out+=`  [貴族${i+1}] 必要ボーナス: ${req}\n`; }
  out+='\n';
  for(let p=0;p<numPlayers;p++){
    const rawName=val('pname_'+p)||(p===0?'自分':'相手'+p);
    const name=rawName.replace(/[<>&"']/g,c=>({'<':'＜','>':'＞','&':'＆','"':'″',"'":'′'}[c]));
    const vp=val('pvp_'+p);
    out+=`■ ${name}の状況\n`;
    if(vp&&vp!=='0') out+=`  勝利点: ${vp}点\n`;
    const tkParts=tids.map((c,i)=>{ const v=val('pt_'+p+'_'+c); return v&&v!=='0'?tnames[i]+v:''; }).filter(Boolean).join('・');
    if(tkParts) out+=`  トークン: ${tkParts}\n`;
    const bParts=gemColors.map((c,i)=>{ const v=val('pb_'+p+'_'+c); return v&&v!=='0'?gemJP[i]+v:''; }).filter(Boolean).join('・');
    if(bParts) out+=`  カードボーナス: ${bParts}\n`;
    const reserved=[];
    for(let r=0;r<3;r++){
      const c=getReservedData(p,r);
      if(c){ const cost=gemJP.map((j,k)=>c[3+k]?j+c[3+k]:'').filter(Boolean).join('・'); reserved.push(`T${c[0]} ${bonusEmoji[c[1]]}${c[1]} VP${c[2]} コスト:${cost||'なし'}`); }
    }
    if(reserved.length) out+=`  予約カード: ${reserved.join(' / ')}\n`;
    out+='\n';
  }
  const note=val('noteBox').trim();
  out+='---\n'+(note||'上記の盤面で、最適な次の手を一緒に考えてください。');
  document.getElementById('outputBox').textContent=out;
}

function copyText() {
  const text=document.getElementById('outputBox').textContent;
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(showToast); }
  else{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(); }
}

function showToast(msg) {
  const t=document.getElementById('copyToast');
  t.textContent = typeof msg==='string' ? msg : '✓ コピーしました！';
  t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',2000);
}

// ===== 自動保存 =====
function captureState() {
  const state={numPlayers};
  const tc=document.getElementById('turnCount'); if(tc) state.turnCount=tc.value;
  const cp=document.getElementById('currentPlayer'); if(cp) state.currentPlayer=cp.value;
  const nb=document.getElementById('noteBox'); if(nb) state.note=nb.value;
  ['white','blue','green','red','black','gold'].forEach(c=>{ const el=document.getElementById('tk_'+c); if(el) state['tk_'+c]=el.value; });
  for(let t=1;t<=3;t++) for(let i=0;i<4;i++) ['pts','bonus','pick'].forEach(k=>{ const el=document.getElementById(`c${t}_${i}_${k}`); if(el) state[`c${t}_${i}_${k}`]=el.value; });
  for(let i=0;i<numPlayers+1;i++) gemColors.forEach(c=>{ const el=document.getElementById(`n${i}_${c}`); if(el) state[`n${i}_${c}`]=el.value; });
  for(let p=0;p<numPlayers;p++){
    const nm=document.getElementById('pname_'+p); if(nm) state['pname_'+p]=nm.value;
    const vp=document.getElementById('pvp_'+p); if(vp) state['pvp_'+p]=vp.value;
    ['white','blue','green','red','black','gold'].forEach(c=>{ const el=document.getElementById('pt_'+p+'_'+c); if(el) state['pt_'+p+'_'+c]=el.value; });
    gemColors.forEach(c=>{ const el=document.getElementById('pb_'+p+'_'+c); if(el) state['pb_'+p+'_'+c]=el.value; });
    for(let r=0;r<3;r++) ['pts','bonus','pick'].forEach(k=>{ const el=document.getElementById(`pr_${p}_${r}_${k}`); if(el) state[`pr_${p}_${r}_${k}`]=el.value; });
  }
  return state;
}

function saveState() {
  try{ localStorage.setItem('splendor_state',JSON.stringify(captureState())); }catch(e){}
}

function applyState(state) {
  if(!state) return;
  const tc=document.getElementById('turnCount'); if(tc&&state.turnCount!=null) tc.value=state.turnCount;
  const cp=document.getElementById('currentPlayer'); if(cp&&state.currentPlayer!=null){ const cpv=parseInt(state.currentPlayer); cp.value=String(cpv>=0&&cpv<numPlayers?cpv:0); }
  const nb=document.getElementById('noteBox'); if(nb) nb.value=state.note||'';
  ['white','blue','green','red','black','gold'].forEach(c=>{ const el=document.getElementById('tk_'+c); if(el&&state['tk_'+c]!=null) el.value=state['tk_'+c]; });
  for(let t=1;t<=3;t++) for(let i=0;i<4;i++){
    const pts=state[`c${t}_${i}_pts`], bonus=state[`c${t}_${i}_bonus`], pick=state[`c${t}_${i}_pick`];
    const pe=document.getElementById(`c${t}_${i}_pts`), be=document.getElementById(`c${t}_${i}_bonus`);
    if(pe&&pts!=null) pe.value=pts;
    if(be&&bonus!=null) be.value=bonus;
    if(pts||bonus) updateCardSelect(t,i);
    const pk=document.getElementById(`c${t}_${i}_pick`);
    if(pk&&pick!=null){ pk.value=pick; showCardInfo(t,i); }
  }
  for(let i=0;i<numPlayers+1;i++) gemColors.forEach(c=>{ const el=document.getElementById(`n${i}_${c}`); if(el&&state[`n${i}_${c}`]!=null) el.value=state[`n${i}_${c}`]; });
  for(let p=0;p<numPlayers;p++){
    const nm=document.getElementById('pname_'+p); if(nm&&state['pname_'+p]!=null) nm.value=state['pname_'+p];
    const vp=document.getElementById('pvp_'+p); if(vp&&state['pvp_'+p]!=null) vp.value=state['pvp_'+p];
    ['white','blue','green','red','black','gold'].forEach(c=>{ const el=document.getElementById('pt_'+p+'_'+c); if(el&&state['pt_'+p+'_'+c]!=null) el.value=state['pt_'+p+'_'+c]; });
    gemColors.forEach(c=>{ const el=document.getElementById('pb_'+p+'_'+c); if(el&&state['pb_'+p+'_'+c]!=null) el.value=state['pb_'+p+'_'+c]; });
    for(let r=0;r<3;r++){
      const pts=state[`pr_${p}_${r}_pts`], bonus=state[`pr_${p}_${r}_bonus`], pick=state[`pr_${p}_${r}_pick`];
      const pe=document.getElementById(`pr_${p}_${r}_pts`), be=document.getElementById(`pr_${p}_${r}_bonus`);
      if(pe&&pts!=null) pe.value=pts;
      if(be&&bonus!=null) be.value=bonus;
      if(pts||bonus) updateReservedSelect(p,r);
      const pk=document.getElementById(`pr_${p}_${r}_pick`);
      if(pk&&pick!=null){ pk.value=pick; showReservedInfo(p,r); }
    }
  }
  const cpv=parseInt(document.getElementById('currentPlayer')?.value||0);
  switchTab(cpv);
  for(let p=0;p<numPlayers;p++) updateTabName(p);
}

function restoreState() {
  let state;
  try{ state=JSON.parse(localStorage.getItem('splendor_state')); }catch(e){}
  applyState(state);
}

// ===== Undo =====
let _undoState = null;
function saveUndo() {
  _undoState = captureState();
  const btn=document.getElementById('btnUndo'); if(btn) btn.disabled=false;
}
function undoAction() {
  if(!_undoState) return;
  applyState(_undoState);
  _undoState=null;
  const btn=document.getElementById('btnUndo'); if(btn) btn.disabled=true;
  saveState();
}

  const cur=_tokenPick[c]||0;
  _tokenPick[c] = cur===0 ? 1 : (cur===1 && field>=4) ? 2 : 0;
  document.getElementById('tpc_'+c).textContent=_tokenPick[c];
  document.getElementById('tpi_'+c).classList.toggle('selected',_tokenPick[c]>0);
  updateTokenPickInfo();
}

function updateTokenPickInfo() {
  const p=parseInt(document.getElementById('currentPlayer')?.value||0);
  const allColorKeys=['white','blue','green','red','black','gold'];
  const playerTotal=allColorKeys.reduce((s,c)=>s+parseInt(val('pt_'+p+'_'+c)||0),0);
  const taking=Object.values(_tokenPick).reduce((a,b)=>a+b,0);
  const colors=gemColors.filter(c=>_tokenPick[c]>0);
  const info=document.getElementById('tokenPickInfo');

  let valid=true, msg='';
  if(taking>0){
    const allOne=colors.every(c=>_tokenPick[c]===1);
    const allTwo=colors.length===1 && _tokenPick[colors[0]]===2;
    if(!allOne && !allTwo){ valid=false; msg='⚠ 3色を1枚ずつ、または同色2枚のみ選択できます'; }
    else if(allTwo && parseInt(val('tk_'+colors[0])||0)<4){ valid=false; msg='⚠ 同色2枚取得は場に4枚以上必要です'; }
    else if(allOne && colors.length>3){ valid=false; msg='⚠ 最大3色まで選択できます'; }
    else if(playerTotal+taking>10){ valid=false; msg=`⚠ 手持ちトークンが上限（10枚）を超えます`; }
    else{ msg=`取得: ${taking}枚 → 所持 ${playerTotal}→${playerTotal+taking}枚`; info.style.color='var(--gold)'; }
  }
  if(!valid) info.style.color='#e74c3c';
  info.textContent=msg;
  document.getElementById('btnTokenConfirm').disabled=!valid && taking>0;
}

function confirmTokenPick() {
  const p=parseInt(document.getElementById('currentPlayer')?.value||0);
  saveUndo();
  gemColors.forEach(c=>{
    const n=_tokenPick[c]||0;
    if(n===0) return;
    const field=document.getElementById('tk_'+c);
    if(field) field.value=String(Math.max(0,parseInt(field.value||0)-n));
    const pt=document.getElementById('pt_'+p+'_'+c);
    if(pt) pt.value=String(parseInt(pt.value||0)+n);
  });
  document.getElementById('tokenModal').classList.remove('show');
  advanceTurn();
  saveState();
}

// ===== 予約カードを購入 =====
function buyReservedCard(p, r) {
  const c = getReservedData(p, r);
  if (!c) { showAlert('先にカードを選択してください'); return; }
  processPurchase(c, p, '予約カードを購入しますか？', function() {
    ['pts','bonus'].forEach(k=>{ const el=document.getElementById(`pr_${p}_${r}_${k}`); if(el) el.value=''; });
    const pickEl=document.getElementById(`pr_${p}_${r}_pick`);
    if(pickEl) pickEl.innerHTML='<option value="">↑で絞り込む</option>';
    const infoEl=document.getElementById(`pr_${p}_${r}_info`);
    if(infoEl) infoEl.textContent='';
    autoAdjustFieldTokens('pt_'+p+'_white');
  });
}

// ===== 初期トークン数 =====
function initFieldTokens() {
  const n = TOKEN_LIMIT_BY_PLAYERS[numPlayers];
  ['white','blue','green','red','black'].forEach(c=>{
    const el=document.getElementById('tk_'+c);
    if(el) el.value=String(n);
  });
  const goldEl=document.getElementById('tk_gold');
  if(goldEl) goldEl.value=String(GOLD_LIMIT);
}

// ===== リセット =====
function resetAll() {
  showConfirm('盤面を全てリセットしますか？', function() {
    // 場のトークンを初期値に
    initFieldTokens();
    // 場のカードをリセット
    for(let t=1;t<=3;t++) for(let i=0;i<4;i++){
      ['pts','bonus'].forEach(k=>{ const el=document.getElementById(`c${t}_${i}_${k}`); if(el) el.value=''; });
      const pk=document.getElementById(`c${t}_${i}_pick`);
      if(pk) pk.innerHTML='<option value="">↑で絞り込む</option>';
      const info=document.getElementById(`c${t}_${i}_info`);
      if(info) info.textContent='';
    }
    // 貴族をリセット
    for(let i=0;i<numPlayers+1;i++) gemColors.forEach(c=>{ const el=document.getElementById(`n${i}_${c}`); if(el) el.value='0'; });
    // プレイヤーをリセット
    for(let p=0;p<numPlayers;p++){
      const nm=document.getElementById('pname_'+p); if(nm) nm.value='';
      const vp=document.getElementById('pvp_'+p); if(vp) vp.value='0';
      ['white','blue','green','red','black','gold'].forEach(c=>{ const el=document.getElementById('pt_'+p+'_'+c); if(el) el.value='0'; });
      gemColors.forEach(c=>{ const el=document.getElementById('pb_'+p+'_'+c); if(el) el.value='0'; });
      for(let r=0;r<3;r++){
        ['pts','bonus'].forEach(k=>{ const el=document.getElementById(`pr_${p}_${r}_${k}`); if(el) el.value=''; });
        const pk=document.getElementById(`pr_${p}_${r}_pick`);
        if(pk) pk.innerHTML='<option value="">↑で絞り込む</option>';
        const info=document.getElementById(`pr_${p}_${r}_info`);
        if(info) info.textContent='';
      }
    }
    // ターン数・手番プレイヤーをリセット
    const tc=document.getElementById('turnCount'); if(tc) tc.value='1';
    const cp=document.getElementById('currentPlayer'); if(cp) cp.value='0';
    // 追記欄・Undoをリセット
    const nb=document.getElementById('noteBox'); if(nb) nb.value='';
    _undoState=null; const undoBtn=document.getElementById('btnUndo'); if(undoBtn) undoBtn.disabled=true;
    // タブ名をデフォルトに戻す
    for(let p=0;p<numPlayers;p++) updateTabName(p);
    switchTab(0);
    document.getElementById('outputBox').textContent='← ボタンを押すと生成されます';
    try{ localStorage.removeItem('splendor_state'); }catch(e){}
  });
}

// ===== トークン自動調整・上限チェック =====
function autoAdjustFieldTokens(changedId) {
  if (!changedId || !changedId.startsWith('pt_')) return;

  const colorKeys = ['white','blue','green','red','black'];
  const colorTotal = TOKEN_LIMIT_BY_PLAYERS[numPlayers];

  // 変更されたIDからプレイヤーを特定
  const parts = changedId.split('_'); // pt_0_white → ['pt','0','white']
  const changedP = parseInt(parts[1]);

  let adjusted = false;
  // 各色について上限チェック＆場の調整
  [...colorKeys, 'gold'].forEach(c => {
    const limit = c === 'gold' ? GOLD_LIMIT : colorTotal;
    // 全プレイヤーの合計を計算
    let playerSum = 0;
    for (let p=0; p<numPlayers; p++) {
      playerSum += parseInt(val('pt_'+p+'_'+c)||0);
    }
    // 合計が上限を超えた場合、変更したプレイヤーの値を削る
    if (playerSum > limit) {
      const el = document.getElementById('pt_'+changedP+'_'+c);
      if (el) {
        const excess = playerSum - limit;
        const current = parseInt(el.value||0);
        el.value = String(Math.max(0, current - excess));
        adjusted = true;
        // 再計算
        playerSum = 0;
        for (let p=0; p<numPlayers; p++) {
          playerSum += parseInt(val('pt_'+p+'_'+c)||0);
        }
      }
    }
    // 場のトークンを差し引きで設定（金も含む）
    const fieldEl = document.getElementById('tk_'+c);
    if (fieldEl) fieldEl.value = String(Math.max(0, limit - playerSum));
  });
  if (adjusted) showToast('トークンを上限に合わせて調整しました');
}

// ===== イベント =====
document.addEventListener('click', function(e) {
  // IDで直接判定するものを先に処理
  if (e.target.id==='btnReset') { resetAll(); return; }
  if (e.target.id==='btnGenerate') { generate(); return; }
  if (e.target.id==='btnCopy') { copyText(); return; }
  if (e.target.id==='btnEndTurn') { advanceTurn(); return; }
  if (e.target.id==='btnTokenTake') { showTokenPicker(); return; }
  if (e.target.id==='btnUndo') { undoAction(); return; }
  if (e.target.id==='btnTokenCancel') { document.getElementById('tokenModal').classList.remove('show'); return; }
  if (e.target.id==='btnTokenConfirm') { confirmTokenPick(); return; }

  // トークン取得モーダルのカラー選択
  const tpi=e.target.closest('.token-pick-item');
  if (tpi) { clickTokenPick(tpi.dataset.color); return; }

  const role = e.target.dataset.role;
  if (!role) return;
  if (role==='tab') { switchTab(parseInt(e.target.dataset.p)); return; }
  if (e.target.classList.contains('np-btn')) { setPlayers(parseInt(e.target.dataset.n)); return; }
  if (role==='buy') { buyCard(parseInt(e.target.dataset.tier), parseInt(e.target.dataset.idx)); return; }
  if (role==='rbuy') { buyReservedCard(parseInt(e.target.dataset.p), parseInt(e.target.dataset.r)); return; }
  if (role==='reserve') { reserveCard(parseInt(e.target.dataset.tier), parseInt(e.target.dataset.idx)); return; }
});

document.addEventListener('change', function(e) {
  const role=e.target.dataset.role;
  if(role==='cpts'||role==='cbonus') updateCardSelect(parseInt(e.target.dataset.tier),parseInt(e.target.dataset.idx));
  if(role==='cpick') { showCardInfo(parseInt(e.target.dataset.tier),parseInt(e.target.dataset.idx)); refreshAllCardSelects(e.target.id); }
  if(role==='rpts'||role==='rbonus') updateReservedSelect(parseInt(e.target.dataset.p),parseInt(e.target.dataset.r));
  if(role==='rpick') { showReservedInfo(parseInt(e.target.dataset.p),parseInt(e.target.dataset.r)); refreshAllCardSelects(e.target.id); }
  autoAdjustFieldTokens(e.target.id);
  saveState();
});
document.addEventListener('input', function(e) {
  if(e.target.id&&e.target.id.startsWith('pname_')) updateTabName(parseInt(e.target.id.split('_')[1]));
  saveState();
});

// ===== 初期化 =====
(function init(){
  // プレイヤー人数ボタン
  const npRow=document.getElementById('npRow');
  [2,3,4].forEach(n=>{
    const b=document.createElement('button');
    b.className='np-btn'+(n===2?' active':'');
    b.dataset.n=n;
    b.textContent=n+'人';
    b.addEventListener('click',()=>setPlayers(n));
    npRow.appendChild(b);
  });
  // ターン数選択肢を生成
  const tcEl=document.getElementById('turnCount');
  for(let i=1;i<=40;i++){
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=i;
    tcEl.appendChild(opt);
  }
  // トークン
  ['white','blue','green','red','black'].forEach(c=>fillSel('tk_'+c,7));
  fillSel('tk_gold',5);
  initFieldTokens();
  // カード
  for(let t=1;t<=3;t++){
    let h='';
    for(let i=0;i<4;i++) h+=cardHTML(t,i);
    document.getElementById('tier'+t).innerHTML=h;
  }
  renderNobles();
  renderPlayers();
  restoreState();
})();
</script>
